<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budgetra — Expense Tracker</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%231A56DB'/%3E%3Cstop offset='100%25' stop-color='%235B4FCF'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M5 23L10 17L15 20L27 10M27 10V16M27 10H21' stroke='white' stroke-width='2.8' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='10' cy='17' r='2' fill='white'/%3E%3Ccircle cx='15' cy='20' r='2' fill='white'/%3E%3Ccircle cx='27' cy='10' r='2' fill='white'/%3E%3C/svg%3E">
  
  <!-- CSS Files -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components/navbar.css">
  <link rel="stylesheet" href="css/components/sidebar.css">
  <link rel="stylesheet" href="css/components/tabs.css">
  <link rel="stylesheet" href="css/components/cards.css">
  <link rel="stylesheet" href="css/components/forms.css">
  <link rel="stylesheet" href="css/components/modals.css">
  <link rel="stylesheet" href="css/components/buttons.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/fixes.css">
</head>
<body>
  <!-- Sidebar Toggle Button -->
  <button class="sb-toggle open" id="sbToggle" title="Toggle sidebar" aria-label="Toggle sidebar">
    <svg width="10" height="14" viewBox="0 0 10 14" fill="none">
      <path d="M2 2L8 7L2 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <!-- Sidebar Overlay -->
  <div class="sb-overlay" id="sbOverlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-header">
      <div class="sb-header-brand">
        <div class="sb-header-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2"/>
            <path d="M16 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4z" fill="white" stroke="none"/>
            <path d="M2 10h20M6 7V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v2"/>
          </svg>
        </div>
        <div>
          <div class="sb-header-title">Finance Tools</div>
          <div class="sb-header-sub">Festival · Payments · EMI</div>
        </div>
      </div>
      <button class="sb-close" id="sbClose" aria-label="Close sidebar">✕</button>
    </div>

    <div class="sb-body" id="sidebarBody">
      <!-- Sidebar content will be loaded dynamically -->
    </div>

    <div class="sb-footer">
      <div class="sb-footer-text">Budgetra Finance Tools</div>
    </div>
  </aside>

  <!-- Main App Wrapper -->
  <div class="app-wrap" id="appWrap">
    <!-- Navigation Area -->
    <div id="navArea"></div>
    
    <!-- Page Content -->
    <div class="page">
      <!-- Tabs Area -->
      <div id="tabsArea"></div>
      
      <!-- Main Content Area -->
      <div id="mainArea">
        <div style="text-align:center;padding:40px;color:var(--muted)">
          Loading...
        </div>
      </div>
      
      <!-- Modal Area -->
      <div id="modalArea"></div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast"></div>

  <!-- JavaScript Modules -->
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/components/sidebar.js"></script>
</body>
</html>
