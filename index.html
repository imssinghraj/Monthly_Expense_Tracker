<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F6F3;--surface:#FFFFFF;--border:#E8E5DF;
  --text:#1A1916;--muted:#8A8680;
  --surface-2:#FBFAF7;--surface-3:#F1EEE8;--ring:rgba(26,25,22,.08);
  --green:#2D6A4F;--green-bg:#ECF4F0;--green-bd:#C3DDD4;
  --red:#B5281C;--red-bg:#FDF0EF;--red-bd:#F3CECA;
  --orange:#C4620D;--orange-bg:#FEF3E8;--orange-bd:#F5D9BE;
  --blue:#1D4E8F;--blue-bg:#EEF3FA;--blue-bd:#C3D3EA;
  --purple:#534AB7;--purple-bg:#EEEDFE;--purple-bd:#AFA9EC;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
}
html.dark{
  --bg:#0F131A;--surface:#171C24;--surface-2:#1D2430;--surface-3:#242D3A;--border:#2B3544;
  --text:#EDF2F7;--muted:#8F9BAA;--ring:rgba(148,163,184,.14);
  --green:#66C18C;--green-bg:#102317;--green-bd:#224832;
  --red:#F26B5E;--red-bg:#281412;--red-bd:#55302B;
  --orange:#F0A64B;--orange-bg:#261A10;--orange-bd:#5A4122;
  --blue:#71A7FF;--blue-bg:#111D33;--blue-bd:#28456F;
  --purple:#9A8CFF;--purple-bg:#1B1730;--purple-bd:#40357A;
  --shadow:0 18px 42px rgba(2,6,12,.32),0 2px 10px rgba(2,6,12,.22);
}
html{font-size:15px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding-bottom:60px;transition:background .2s,color .2s}
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;transition:background .2s,border-color .2s}
.nav-center{display:flex;flex-direction:column;align-items:center}
.nav-title{font-size:16px;font-weight:600;letter-spacing:-.01em}
.nav-sub{font-size:11px;color:var(--muted);margin-top:1px}
.nav-side{display:flex;align-items:center;gap:6px}
.nav-arrows{display:flex;gap:6px}
.nav-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);font-size:14px;transition:background .15s}
.nav-btn:hover{background:var(--bg)}
.today-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 12px;font-size:12px;cursor:pointer;color:var(--muted);font-family:inherit;transition:all .15s}
.today-btn:hover{border-color:var(--text);color:var(--text)}
.theme-toggle{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s;flex-shrink:0}
.theme-toggle:hover{background:var(--bg)}
.menu-wrap{position:relative}
.menu-dropdown{position:absolute;right:0;top:calc(100% + 6px);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;min-width:180px;box-shadow:0 4px 24px rgba(0,0,0,.12);z-index:300;animation:fadeIn .12s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.menu-item{display:flex;align-items:center;gap:10px;padding:9px 12px;font-size:13px;color:var(--text);cursor:pointer;border-radius:var(--radius-sm);transition:background .1s;font-family:inherit;background:none;border:none;width:100%;text-align:left}
.menu-item:hover{background:var(--bg)}
.menu-item .mi-icon{font-size:15px;width:18px;text-align:center}
.menu-sep{height:1px;background:var(--border);margin:4px 8px}
.page{max-width:1100px;margin:0 auto;padding:20px 16px 0}
.tabs{display:flex;gap:6px;margin-bottom:16px}
.tab{flex:1;padding:9px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;text-align:center;color:var(--muted);transition:all .15s;font-family:inherit}
.tab.active{background:var(--text);color:var(--surface);border-color:var(--text)}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:8px}
.budget-banner{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.budget-banner.unset{border-color:var(--orange-bd);background:var(--orange-bg)}
.bb-left .bb-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:3px}
.bb-left .bb-val{font-size:22px;font-weight:600;letter-spacing:-.01em}
.bb-left .bb-sub{font-size:12px;color:var(--muted);margin-top:2px}
.bb-right{display:flex;gap:6px;flex-wrap:wrap}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:14px}
.stat-wide{grid-column:1/-1}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
.stat-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:5px}
.stat-val{font-size:26px;font-weight:600;line-height:1;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.stat-sub{font-size:12px;color:var(--muted);margin-top:3px}
.stat.green{background:var(--green-bg);border-color:var(--green-bd)}.stat.green .stat-val{color:var(--green)}
.stat.red{background:var(--red-bg);border-color:var(--red-bd)}.stat.red .stat-val{color:var(--red)}
.stat.orange{background:var(--orange-bg);border-color:var(--orange-bd)}.stat.orange .stat-val{color:var(--orange)}
.stat.blue{background:var(--blue-bg);border-color:var(--blue-bd)}.stat.blue .stat-val{color:var(--blue)}
.stat.purple{background:var(--purple-bg);border-color:var(--purple-bd)}.stat.purple .stat-val{color:var(--purple)}
.prog-bg{height:5px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;border-radius:99px;transition:width .4s ease}
.prog-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px}
.mom-badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:99px;display:inline-flex;align-items:center;gap:3px;margin-left:6px}
.mom-up{background:var(--red-bg);color:var(--red)}
.mom-dn{background:var(--green-bg);color:var(--green)}
.mom-flat{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
.date-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.date-disp{font-size:15px;font-weight:600}
.date-row input[type="date"]{border:1px solid var(--border);background:var(--bg);border-radius:var(--radius-sm);padding:5px 9px;font-family:inherit;font-size:13px;color:var(--text);outline:none;cursor:pointer}
.date-row input[type="date"]:focus{border-color:var(--text)}
.entry-block{margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:10px}
.entry-block:last-of-type{border-bottom:none;padding-bottom:0;margin-bottom:0}
.entry-row{display:grid;grid-template-columns:1fr 130px 32px;gap:8px;align-items:end}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.field select,.field input[type="number"]{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-family:inherit;font-size:14px;color:var(--text);background:var(--bg);outline:none;transition:border-color .15s}
.field select:focus,.field input[type="number"]:focus{border-color:var(--text);background:var(--surface)}
.field input::placeholder{color:var(--muted)}
.remove-row-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);width:32px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:13px;transition:all .15s;margin-top:19px;flex-shrink:0}
.remove-row-btn:hover{color:var(--red);background:var(--red-bg);border-color:var(--red-bd)}
.quick-row{display:flex;align-items:center;gap:5px;margin-top:6px;flex-wrap:wrap}
.qa-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:3px 9px;font-size:11px;cursor:pointer;color:var(--muted);font-family:inherit;transition:all .12s;white-space:nowrap}
.qa-btn:hover{background:var(--bg);color:var(--text);border-color:var(--text)}
.qa-sep{flex:1}
.rec-label{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);cursor:pointer;white-space:nowrap}
.rec-label input{accent-color:var(--text)}
.notes-row{margin-top:6px}
.notes-row input[type="text"]{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;font-family:inherit;font-size:13px;color:var(--text);background:var(--bg);outline:none;transition:border-color .15s}
.notes-row input:focus{border-color:var(--text);background:var(--surface)}
.notes-row input::placeholder{color:var(--muted);font-style:italic}
.add-row-btn{width:100%;background:none;border:1px dashed var(--border);border-radius:var(--radius-sm);padding:8px;font-family:inherit;font-size:13px;color:var(--muted);cursor:pointer;transition:all .15s;margin-top:12px;margin-bottom:14px}
.add-row-btn:hover{border-color:var(--text);color:var(--text)}
.form-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.live-total{font-size:13px;color:var(--muted)}.live-total strong{color:var(--text)}
.btns{display:flex;gap:6px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 18px;border-radius:var(--radius-sm);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--text);color:var(--surface);border-color:var(--text)}
.btn-primary:hover{opacity:.85}
.btn-ghost{background:transparent;color:var(--muted)}
.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-orange{background:var(--orange);color:#fff;border-color:var(--orange)}
.btn-orange:hover{opacity:.85}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}
.btn-green:hover{opacity:.85}
.recurring-section{margin-bottom:14px}
.recurring-list{display:flex;flex-direction:column;gap:6px}
.recurring-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow)}
.rec-note-text{font-size:12px;color:var(--muted);font-style:italic;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rec-amt{font-size:14px;font-weight:600}
.cat-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap}
.cat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.pill-saved{background:var(--green-bg);color:var(--green)}
.pill-ok{background:var(--blue-bg);color:var(--blue)}
.pill-high{background:var(--orange-bg);color:var(--orange)}
.pill-over{background:var(--red-bg);color:var(--red)}
.cat-chart{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;box-shadow:var(--shadow)}
.cat-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.cat-name{font-size:12px;color:var(--muted);width:85px;flex-shrink:0}
.cat-bar-bg{flex:1;height:8px;background:var(--border);border-radius:99px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:99px;transition:width .4s}
.cat-amt{font-size:12px;font-weight:600;min-width:50px;text-align:right}
.history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.history-list{display:flex;flex-direction:column;gap:8px}
.day-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.day-header{display:grid;grid-template-columns:36px 1fr auto;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;transition:background .12s}
.day-header:hover{background:var(--bg)}
.day-card.expanded .day-header{border-bottom:1px solid var(--border)}
.day-badge{width:36px;height:36px;border-radius:9px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
.day-main .date-str{font-size:11px;color:var(--muted);margin-bottom:2px}
.day-main .total-str{font-weight:600;font-size:14px}
.day-main .pills-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.day-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.saved-amt{font-size:11px;font-weight:600}
.c-green{color:var(--green)}.c-red{color:var(--red)}
.chevron{font-size:11px;color:var(--muted);transition:transform .2s;margin-top:2px}
.day-card.expanded .chevron{transform:rotate(180deg)}
.entry-list{padding:6px 14px 10px}
.entry-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);position:relative;transition:transform .2s,opacity .2s;overflow:hidden}
.entry-item:last-child{border-bottom:none}
.entry-cat-col{flex:0 0 auto}
.entry-note-badge{font-size:11px;color:var(--muted);font-style:italic;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:0 1 auto}
.entry-spacer{flex:1}
.entry-amt{font-size:14px;font-weight:600;flex:0 0 auto}
.entry-actions{display:flex;gap:4px;flex:0 0 auto}
.icon-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:12px;cursor:pointer;color:var(--muted);transition:all .12s;font-family:inherit;font-weight:500}
.icon-btn.del:hover{color:var(--red);background:var(--red-bg);border-color:var(--red-bd)}
.icon-btn.edit-btn:hover{color:var(--blue);background:var(--blue-bg);border-color:var(--blue-bd)}
.swipe-del-bg{position:absolute;right:0;top:0;bottom:0;background:var(--red);display:flex;align-items:center;padding:0 16px;color:#fff;font-size:12px;font-weight:600;pointer-events:none;opacity:0;transition:opacity .15s}
.entry-edit-form{padding:10px 0;border-bottom:1px solid var(--border)}
.entry-edit-form .edit-grid{display:grid;grid-template-columns:1fr 120px;gap:8px;margin-bottom:8px}
.entry-edit-form select,.entry-edit-form input[type="number"]{border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;font-family:inherit;font-size:13px;color:var(--text);background:var(--bg);outline:none;width:100%}
.entry-edit-form select:focus,.entry-edit-form input[type="number"]:focus,.entry-edit-form input[type="text"]:focus{border-color:var(--text)}
.entry-edit-form input[type="text"]{border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;font-family:inherit;font-size:13px;color:var(--text);background:var(--bg);outline:none;width:100%;margin-bottom:8px}
.entry-edit-form .edit-actions{display:flex;gap:6px}
.week-bars{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:16px}
.week-bar-item{display:flex;flex-direction:column;align-items:center;gap:3px}
.week-bar-item.today .week-bar-label{color:var(--text);font-weight:700}
.week-bar-item.today .week-bar-date{color:var(--text);font-weight:700}
.week-bar-amt{font-size:10px;font-weight:600;color:var(--muted);height:14px;text-align:center;white-space:nowrap;overflow:hidden;max-width:100%}
.week-bar-bg{width:100%;height:80px;background:var(--border);border-radius:6px;overflow:hidden;position:relative;display:flex;flex-direction:column;justify-content:flex-end}
.week-bar-fill{width:100%;border-radius:6px;transition:height .4s ease;min-height:0}
.week-bar-label{font-size:11px;color:var(--muted);font-weight:500}
.week-bar-date{font-size:12px;color:var(--muted);font-weight:500}
.year-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.month-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.month-card:hover{border-color:#ccc}
.month-card.current-month{border-color:var(--text);border-width:2px}
.mc-name{font-size:12px;font-weight:600;margin-bottom:2px}
.mc-budget{font-size:11px;color:var(--muted);margin-bottom:4px}
.mc-val{font-size:18px;font-weight:600;letter-spacing:-.01em}
.mc-sub{font-size:11px;color:var(--muted);margin-top:2px}
.mc-bar{height:3px;background:var(--border);border-radius:99px;margin-top:8px;overflow:hidden}
.mc-fill{height:100%;border-radius:99px}
.mc-no-budget{font-size:11px;color:var(--orange);margin-top:4px}
.insight-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.ins-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;text-align:center;box-shadow:var(--shadow)}
.ins-val{font-size:20px;font-weight:600;letter-spacing:-.01em;font-variant-numeric:tabular-nums}
.ins-lbl{font-size:11px;color:var(--muted);margin-top:3px}
.section-block{margin-bottom:18px}
.dashboard-grid{display:grid;grid-template-columns:1fr;gap:20px}
.dashboard-primary,.dashboard-secondary{display:flex;flex-direction:column;gap:20px;min-width:0}
.dashboard-primary>*,.dashboard-secondary>*{width:100%}
.dashboard-secondary .cat-chart,.dashboard-secondary .recurring-section{margin-bottom:0}
.cmp-chart-wrap{margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.cmp-chart-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:10px}
.cmp-chart-legend{display:flex;gap:14px;margin-bottom:10px}
.cmp-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.cmp-legend-line{width:18px;height:2px;border-radius:2px;flex-shrink:0}
.cmp-svg{width:100%;display:block;overflow:visible}
.cmp-axis-label{font-size:9px;fill:var(--muted);font-family:'Segoe UI',system-ui,sans-serif}
.sticky-desktop{position:relative}
.compact-stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.compact-stats .stat{min-width:0}
.compact-stats .stat-lbl{line-height:1.35}
.compact-stats .stat-val{font-size:18px}

/* ── HEATMAP — GitHub Style ─────────────────────── */
.heatmap-wrap{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 16px 38px;margin-bottom:14px;box-shadow:var(--shadow);overflow:hidden}
.heatmap-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.heatmap-year-select{border:1px solid var(--border);border-radius:8px;padding:4px 28px 4px 10px;font-size:11px;font-weight:600;color:var(--text);background:var(--surface);font-family:inherit;cursor:pointer;outline:none;transition:border-color .12s,background .12s}
.heatmap-year-select:hover{border-color:var(--text)}
.heatmap-year-select:focus{border-color:var(--text)}
.hm-scroll-inner{display:flex;justify-content:center;width:100%;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;padding-bottom:6px}
.hm-month-strip{display:flex;gap:6px;align-items:flex-start;width:max-content;padding-right:8px}
.hm-month-block{display:flex;flex-direction:column;gap:6px;align-items:center}
.hm-month-label{font-size:10px;color:var(--muted);line-height:14px;white-space:nowrap;overflow:visible;text-align:center;width:100%}
.heatmap-grid{display:grid;grid-auto-flow:column;grid-auto-columns:13px;grid-template-rows:repeat(7,13px);gap:2px}
.hm-cell{width:13px;height:13px;border-radius:3px;cursor:pointer;position:relative;transition:transform .1s,box-shadow .1s;flex-shrink:0}
.hm-cell:hover{transform:scale(1.3);z-index:10;box-shadow:0 1px 5px rgba(0,0,0,.28)}
.hm-cell.hm-empty{background:transparent!important;cursor:default;pointer-events:none}
.hm-cell.hm-no-data{background:var(--border);opacity:.55;cursor:default}
.hm-cell.hm-no-data:hover{transform:none;box-shadow:none}
.hm-cell.hm-today{box-shadow:0 0 0 1.5px var(--text)!important}
.hm-cell.hm-today:hover{transform:scale(1.3);box-shadow:0 0 0 1.5px var(--text),0 1px 5px rgba(0,0,0,.28)!important}

/* EMPTY STATE */

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeOverlay .15s ease}

.modal input[type="number"],.modal input[type="text"]{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-family:inherit;font-size:15px;color:var(--text);background:var(--bg);outline:none;transition:border-color .15s}

<body>
<div id="navArea"></div>
<div class="page">
  <div id="tabsArea"></div>
  <div id="mainArea"></div>
</div>
<div id="modalArea"></div>
<div id="toast"></div>

<script>
/* ── CONSTANTS ───────────────────────────────────── */
const MONTHS   = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_S = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const PRESET_COLORS = [
  '#B5281C','#1D4E8F','#C4620D','#534AB7',
  '#2D6A4F','#8B5E3C','#C44B8A','#1A7A6A',
  '#7A3B1E','#376B8A','#8B2252','#5A6B1B',
];
const DEFAULT_CATS = {
  lunch:    { label:'Lunch',      color:'#1D4E8F' },
  cig:      { label:'Cigarettes', color:'#B5281C' },
  snacks:   { label:'Snacks',     color:'#C4620D' },
  shopping: { label:'Shopping',   color:'#C44B8A' },
  travel:   { label:'Travel',     color:'#2D6A4F' },
  other:    { label:'Other',      color:'#534AB7' },
};

/* ── STATE ───────────────────────────────────────── */
let entries = {}, budgets = {}, customCats = {...DEFAULT_CATS}, recurring = [];
let viewYear, viewMonth, viewWeekStart, activeTab = 'month';
let formRows = [{ cat:'lunch', amount:'', notes:'', rec:false }];
let formDate = '';
let heatmapYear;
let compareMonthKey = '';
let darkMode = false;

/* ── DARK MODE ───────────────────────────────────── */
function initTheme(){
  const saved = localStorage.getItem('exp_theme');
  darkMode = saved === 'dark';
  applyTheme();
}
function toggleTheme(){
  darkMode = !darkMode;
  localStorage.setItem('exp_theme', darkMode ? 'dark' : 'light');
  applyTheme();
  document.querySelectorAll('.theme-toggle').forEach(btn => {
    btn.textContent = darkMode ? '☀️' : '🌙';
    btn.title = darkMode ? 'Switch to light mode' : 'Switch to dark mode';
  });
}
function applyTheme(){
  document.documentElement.classList.toggle('dark', darkMode);
}

/* ── PERSISTENCE ─────────────────────────────────── */
function loadData(){
  try{
    const s = localStorage.getItem('exp_tracker_v3');
    if(s){
      const d = JSON.parse(s);
      budgets = d.budgets || {};
      if(d.customCats) customCats = d.customCats;
      if(d.recurring) recurring = d.recurring;
      const raw = d.entries || {};
      entries = {};
      for(const [date, val] of Object.entries(raw)){
        if(Array.isArray(val)){
          entries[date] = val;
        } else {
          const arr = [];
          for(const cat of Object.keys(DEFAULT_CATS)){
            const amt = parseFloat(val[cat]) || 0;
            if(amt > 0) arr.push({ id: uid(), cat, amount: amt });
          }
          if(arr.length) entries[date] = arr;
        }
      }
    }
  }catch(e){}
  viewYear = nowYear(); viewMonth = nowMonth();
  viewWeekStart = getWeekStart(today());
  heatmapYear = nowYear();
}
function saveData(){
  try{ localStorage.setItem('exp_tracker_v3', JSON.stringify({entries, budgets, customCats, recurring})); }catch(e){}
}
function uid(){ return Math.random().toString(36).slice(2,9); }

/* ── UTILS ───────────────────────────────────────── */
function today(){ return new Date().toISOString().slice(0,10); }
function nowYear(){ return new Date().getFullYear(); }
function nowMonth(){ return new Date().getMonth(); }
function nowDay(){ return new Date().getDate(); }
function daysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }
function monthKey(y,m){ return `${y}-${String(m+1).padStart(2,'0')}`; }
function fmtISO(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function fmtDate(iso){ const [y,m,d]=iso.split('-'); return `${parseInt(d)} ${MONTHS_S[parseInt(m)-1]} ${y}`; }
function fmt(n){ return '₹'+Math.round(Math.abs(n)).toLocaleString('en-IN'); }
function fmtPct(n){ return `${n>0?'+':''}${n.toFixed(1)}%`; }
function dayTotal(iso){ return (entries[iso]||[]).reduce((s,e)=>s+e.amount,0); }
function monthDates(y,m){ const p=monthKey(y,m); return Object.keys(entries).filter(k=>k.startsWith(p)&&(entries[k]||[]).length>0).sort((a,b)=>b.localeCompare(a)); }
function monthSpent(y,m){ return monthDates(y,m).reduce((s,k)=>s+dayTotal(k),0); }
function parseMonthKey(key){ const [y,m] = key.split('-').map(Number); return { y, m: m - 1 }; }
function monthLabelFromKey(key){ const {y,m} = parseMonthKey(key); return `${MONTHS_S[m]} ${y}`; }
function getMonthBudget(y,m){ return budgets[monthKey(y,m)]||null; }
function dailyLimit(y,m){ const b=getMonthBudget(y,m); return b?b/daysInMonth(y,m):null; }
function daysLeft(y,m){ return (y===nowYear()&&m===nowMonth())?daysInMonth(y,m)-nowDay()+1:0; }
function monthCatTotals(y,m){
  const t={};
  Object.keys(customCats).forEach(k=>{ t[k]=0; });
  monthDates(y,m).forEach(iso=>(entries[iso]||[]).forEach(e=>{ t[e.cat]=(t[e.cat]||0)+e.amount; }));
  return t;
}
function dayNetSavings(y,m){
  const dl=dailyLimit(y,m);
  if(!dl) return null;
  return monthDates(y,m).reduce((sum,k)=>sum+(dl-dayTotal(k)),0);
}
function dateToISO(dt){ return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`; }
function getHeatmapYears(){
  const current = nowYear();
  return [current, current - 1, current - 2];
}
function statusFor(spent,limit){
  if(!limit||!spent) return{label:'',cls:''};
  const p=spent/limit;
  if(p<1) return{label:'Saved',cls:'pill-saved'};
  if(p===1) return{label:'OK',cls:'pill-ok'};
  if(p<=1.25) return{label:'High',cls:'pill-high'};
  return{label:'Over',cls:'pill-over'};
}
function computeStreak(){
  const keys=Object.keys(entries).filter(k=>(entries[k]||[]).length>0).sort((a,b)=>b.localeCompare(a));
  let current=0,best=0,streak=0;
  keys.forEach((k,i)=>{
    const[y,m]=k.split('-').map(Number);
    const dl=dailyLimit(y,m-1);
    const under=dl?dayTotal(k)<dl:false;
    if(under){streak++;if(i===0)current=streak;}
    else{if(streak>best)best=streak;if(i===0)current=0;streak=0;}
  });
  if(streak>best)best=streak;
  return{current,best};
}
function momChange(y,m){
  const curr=monthSpent(y,m);
  let pm=m-1,py=y; if(pm<0){pm=11;py--;}
  const prev=monthSpent(py,pm);
  if(!prev||!curr) return null;
  return ((curr-prev)/prev*100);
}
function getWeekStart(iso){
  const d=new Date(iso+'T00:00:00');
  const day=d.getDay();
  const diff=day===0?-6:1-day;
  d.setDate(d.getDate()+diff);
  return d.toISOString().slice(0,10);
}
function getWeekDates(weekStart){
  const dates=[];
  const d=new Date(weekStart+'T00:00:00');
  for(let i=0;i<7;i++){
    dates.push(new Date(d).toISOString().slice(0,10));
    d.setDate(d.getDate()+1);
  }
  return dates;
}
function hexToRgba(hex,alpha){
  try{
    const r=parseInt(hex.slice(1,3),16);
    const g=parseInt(hex.slice(3,5),16);
    const b=parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }catch(e){ return `rgba(136,136,136,${alpha})`; }
}
function hasUnsavedChanges(){
  return formRows.some(r=>parseFloat(r.amount)>0);
}
function navigateWithCheck(action){
  if(hasUnsavedChanges()){
    customConfirm('You have unsaved entries. Leave anyway?', action, null);
  } else {
    action();
  }
}
function getComparisonMonths(baseYear, baseMonth){
  const baseKey = monthKey(baseYear, baseMonth);
  const currentYear = nowYear();
  const currentMonth = nowMonth();
  const months = [];

  getHeatmapYears().forEach(year => {
    const maxMonth = year === currentYear ? currentMonth : 11;
    for(let month = maxMonth; month >= 0; month--){
      const key = monthKey(year, month);
      if(key !== baseKey) months.push(key);
    }
  });

  return months;
}
function getActiveComparisonKey(baseYear, baseMonth){
  const options = getComparisonMonths(baseYear, baseMonth);
  if(options.includes(compareMonthKey)) return compareMonthKey;
  const baseDate = new Date(baseYear, baseMonth, 1);
  const closest = options.reduce((best, key) => {
    const { y, m } = parseMonthKey(key);
    const diff = Math.abs(baseDate - new Date(y, m, 1));
    if(!best || diff < best.diff) return { key, diff };
    return best;
  }, null);
  return closest ? closest.key : '';
}

/* ── DATE VALIDATION ── */
function getMinAllowedDate(y, m){
  return fmtISO(y, m, 1);
}

/* ── CAT HELPERS ─────────────────────────────────── */
function catPill(cat){
  const c=customCats[cat]||{label:cat,color:'#888'};
  return `<span class="cat-pill" style="background:${hexToRgba(c.color,.12)};color:${c.color};border:1px solid ${hexToRgba(c.color,.28)}"><span class="cat-dot" style="background:${c.color}"></span>${c.label}</span>`;
}
function catOptions(selected){
  return Object.entries(customCats).map(([k,c])=>`<option value="${k}"${selected===k?' selected':''}>${c.label}</option>`).join('');
}

/* ── RENDER ──────────────────────────────────────── */
function render(){
  document.getElementById('navArea').innerHTML  = buildNav();
  document.getElementById('tabsArea').innerHTML = buildTabs();
  document.getElementById('mainArea').innerHTML =
    activeTab==='month'?buildMonthView():
    activeTab==='week' ?buildWeekView() :
    activeTab==='year' ?buildYearView() :buildInsightsView();
  bindEvents();
  requestAnimationFrame(animateCounters);
}

/* ── NAV ─────────────────────────────────────────── */
function buildNav(){
  const user = JSON.parse(localStorage.getItem('exp_user') || 'null');
  const userBtn = user
    ? `<div class="menu-wrap" style="position:relative">
        <button class="nav-btn" id="userMenuBtn" title="${user.name}" style="font-size:12px;font-weight:700;gap:4px;width:auto;padding:0 10px;letter-spacing:0">
          <span style="width:22px;height:22px;border-radius:50%;background:var(--text);color:var(--surface);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">${user.name.charAt(0).toUpperCase()}</span>
          <span style="max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${user.name}</span>
        </button>
      </div>`
    : `<button class="nav-btn" onclick="window.location.href='auth.html'" style="font-size:12px;font-weight:600;width:auto;padding:0 12px">Sign In</button>`;
  const themeBtn = `<button class="theme-toggle" id="themeToggleBtn" title="${darkMode?'Switch to light mode':'Switch to dark mode'}">${darkMode?'☀️':'🌙'}</button>`;
  const menuBtn = `<div class="menu-wrap"><button class="nav-btn" id="menuBtn" title="More options" style="font-size:18px;letter-spacing:1px">⋮</button></div>`;
  if(activeTab==='week'){
    const dates=getWeekDates(viewWeekStart);
    const [sy,sm,sd]=dates[0].split('-');
    const [ey,em,ed]=dates[6].split('-');
    const startStr=`${parseInt(sd)} ${MONTHS_S[parseInt(sm)-1]}`;
    const endStr=`${parseInt(ed)} ${MONTHS_S[parseInt(em)-1]} ${ey}`;
    const isCurrentWeek=viewWeekStart===getWeekStart(today());
    return `<div class="nav">
      <div class="nav-side"><div class="nav-arrows"><button class="nav-btn" id="prevWeekBtn">‹</button></div></div>
      <div class="nav-center">
        <div class="nav-title">${startStr} – ${endStr}</div>
        ${isCurrentWeek?'<div class="nav-sub">Current week</div>':'<button class="today-btn" id="todayBtn">This week</button>'}
      </div>
      <div class="nav-side"><div class="nav-arrows"><button class="nav-btn" id="prevWeekBtn">‹</button></div>${themeBtn}${userBtn}${menuBtn}</div>
    </div>`;
  }
  const ic=(viewYear===nowYear()&&viewMonth===nowMonth());
  return `<div class="nav">
    <div class="nav-side"><div class="nav-arrows">
      <button class="nav-btn" id="prevYearBtn">«</button>
      <button class="nav-btn" id="prevMonthBtn">‹</button>
    </div></div>
    <div class="nav-center">

    <div class="nav-side"><div class="nav-arrows">
      <button class="nav-btn" id="nextMonthBtn">›</button>
      <button class="nav-btn" id="nextYearBtn">»</button>

}

function buildTabs(){

    <button class="tab ${activeTab==='week'?'active':''}" id="tabWeek">Week</button>

function buildBudgetBanner(y,m){

  const dl=b?b/daysInMonth(y,m):null;
  if(!b) return `<div class="budget-banner unset" id="budgetBanner">
    <div class="bb-left"><div class="bb-label">Monthly budget</div><div class="bb-val" style="color:var(--orange)">Not set</div><div class="bb-sub">Set a budget to track spending</div></div>
    <div class="bb-right"><button class="btn btn-orange btn-sm" id="setBudgetBtn">Set budget</button></div>
  </div>`;
  return `<div class="budget-banner" id="budgetBanner">
    <div class="bb-left"><div class="bb-label">Monthly budget — ${MONTHS_S[m]} ${y}</div><div class="bb-val">${fmt(b)}</div><div class="bb-sub">${fmt(dl)} per day · ${daysInMonth(y,m)} days</div></div>
    <div class="bb-right"><button class="btn btn-ghost btn-sm" id="editBudgetBtn">Edit</button></div>
  </div>`;

/* ── MONTH VIEW ──────────────────────────────────── */
function buildMonthView(){
  const budget=getMonthBudget(viewYear,viewMonth);
  const dl=budget?budget/daysInMonth(viewYear,viewMonth):null;
  const mt=monthSpent(viewYear,viewMonth);
  const ic=(viewYear===nowYear()&&viewMonth===nowMonth());
  const mr=budget?budget-mt:null;
  const pct=budget?Math.min(100,(mt/budget)*100):0;
  const left=daysLeft(viewYear,viewMonth);
  const udb=(budget&&left>0)?mr/left:null;
  const tdISO=today();
  const td=(ic&&(entries[tdISO]||[]).length)?dayTotal(tdISO):null;
  const tr=dl!==null?dl-(td||0):null;
  const dns=dayNetSavings(viewYear,viewMonth);
  const mom=momChange(viewYear,viewMonth);
  const categoryHtml=buildCategoryBreakdown(viewYear,viewMonth);
  const recurringHtml=buildRecurringSection();
  const formHtml=buildForm();
  const comparisonHtml=buildMonthComparison(viewYear,viewMonth);
  const historyHtml=buildHistory(viewYear,viewMonth);

  const momBadge=mom!==null?`<span class="mom-badge ${mom>0?'mom-up':mom<0?'mom-dn':'mom-flat'}">${mom>0?'↑':'↓'} ${Math.abs(mom).toFixed(0)}% vs last mo.</span>`:'';

  let s=`<div class="stats section-block"><div class="stat stat-wide">
    <div class="stat-lbl">Monthly spend</div>
    <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">
      <div class="stat-val">${fmt(mt)}</div>${momBadge}
      ${budget?`<div class="stat-sub">of ${fmt(budget)}</div>`:'<div class="stat-sub" style="color:var(--orange)">No budget set</div>'}
    </div>
    ${budget?`<div class="prog-bg"><div class="prog-fill" style="width:${pct}%;background:${pct>90?'var(--red)':pct>70?'var(--orange)':'var(--text)'}"></div></div>
    <div class="prog-meta"><span>${ic?`Day ${nowDay()} of ${daysInMonth(viewYear,viewMonth)}`:`All ${daysInMonth(viewYear,viewMonth)} days`}</span><span>${fmt(mr)} remaining</span></div>`:''}
  </div>`;

  if(ic&&budget){
    s+=`
    <div class="stat ${td!==null?(td>dl*1.25?'red':td>dl?'orange':td>0&&td<dl?'green':''):''}">
      <div class="stat-lbl">Today's spend</div><div class="stat-val">${td!==null?fmt(td):'—'}</div>
      <div class="stat-sub">${td!==null?`<span class="pill ${statusFor(td,dl).cls}">${statusFor(td,dl).label}</span>`:'No entry yet'}</div>
    </div>
    <div class="stat ${tr<0?'red':tr<dl*.3?'orange':'green'}">
      <div class="stat-lbl">Remaining today</div><div class="stat-val">${fmt(Math.max(0,tr))}</div><div class="stat-sub">${fmt(dl)}/day limit</div>
    </div>
    <div class="stat ${udb<0?'red':udb<dl*.6?'orange':'blue'}">
      <div class="stat-lbl">Updated daily budget</div><div class="stat-val">${fmt(Math.max(0,udb))}</div><div class="stat-sub">for ${left} day${left!==1?'s':''} left</div>
    </div>
    <div class="stat ${dns===null?'':dns>=0?'green':'red'}">
      <div class="stat-lbl">Net saved / overspent</div>
      <div class="stat-val">${dns===null?'—':(dns>=0?'+':'-')+fmt(Math.abs(dns))}</div>
      <div class="stat-sub">${dns===null?'Set a budget to track':dns>=0?'net saved across logged days':'net overspent across logged days'}</div>
    </div>`;
  } else if(!ic&&budget){
    const dr=monthDates(viewYear,viewMonth).length;
    const avg=dr>0?mt/dr:0;
    s+=`
    <div class="stat ${dns===null?'':dns>=0?'green':'red'}">
      <div class="stat-lbl">Net saved / overspent</div>
      <div class="stat-val">${dns===null?'—':(dns>=0?'+':'-')+fmt(Math.abs(dns))}</div>
      <div class="stat-sub">${dns===null?'No budget set':dns>=0?'net saved across logged days':'net overspent across logged days'}</div>
    </div>
    <div class="stat blue"><div class="stat-lbl">Avg per day</div><div class="stat-val">${fmt(avg)}</div><div class="stat-sub">${dr} days recorded</div></div>`;
  } else if(ic&&!budget){
    const dr=monthDates(viewYear,viewMonth).length;
    const avg=dr>0?mt/dr:0;
    s+=`
    <div class="stat blue"><div class="stat-lbl">Avg per day</div><div class="stat-val">${fmt(avg)}</div><div class="stat-sub">${dr} days recorded</div></div>
    <div class="stat"><div class="stat-lbl">Days logged</div><div class="stat-val">${dr}</div><div class="stat-sub">Set a budget to see more</div></div>`;
  }
  s+='</div>';
  return `
    <div class="section-block">${buildBudgetBanner(viewYear,viewMonth)}</div>
    ${s}
    <div class="dashboard-grid section-block">
      <div class="dashboard-primary">
        <div class="sticky-desktop">
          ${formHtml}
          ${categoryHtml}
        </div>
      </div>
      <div class="dashboard-secondary">
        <div class="sticky-desktop">
          ${comparisonHtml}
          ${recurringHtml}
        </div>
      </div>
    </div>
    ${historyHtml}`;
}

function buildMonthComparison(y,m){
  const currentKey = monthKey(y,m);
  const currentSpent = monthSpent(y,m);
  const compareKey = getActiveComparisonKey(y,m);
  compareMonthKey = compareKey;
  const { y: compareYear, m: compareMonth } = parseMonthKey(compareKey);
  const previousSpent = monthSpent(compareYear, compareMonth);
  const diff = currentSpent - previousSpent;
  const pct = previousSpent > 0 ? (diff / previousSpent) * 100 : null;
  const tone = diff > 0 ? 'red' : diff < 0 ? 'green' : 'blue';
  const summary = pct === null
    ? (previousSpent === 0 && currentSpent === 0 ? 'No spending in either month' : 'No baseline to calculate change')
    : `${fmtPct(pct)} ${pct >= 0 ? 'vs' : 'from'} ${monthLabelFromKey(compareKey)}`;

  // Build daily cumulative data for both months
  function dailyCumulative(yr, mo) {
    const days = new Date(yr, mo + 1, 0).getDate();
    const data = [];
    let cum = 0;
    for (let d = 1; d <= days; d++) {
      const iso = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      cum += dayTotal(iso);
      data.push(cum);
    }
    return data;
  }

  const curData  = dailyCumulative(y, m);
  const cmpData  = dailyCumulative(compareYear, compareMonth);
  const maxDays  = Math.max(curData.length, cmpData.length);
  const maxVal   = Math.max(...curData, ...cmpData, 1);

  // SVG dimensions
  const W = 260, H = 110, PL = 38, PR = 8, PT = 8, PB = 22;
  const gW = W - PL - PR, gH = H - PT - PB;

  function toX(i, total) { return PL + (i / (total - 1 || 1)) * gW; }
  function toY(v) { return PT + gH - (v / maxVal) * gH; }

  function makePath(data, color, dashed) {
    if (!data.length) return '';
    const pts = data.map((v, i) => `${toX(i, data.length).toFixed(1)},${toY(v).toFixed(1)}`).join(' ');
    const d = 'M ' + pts.split(' ').join(' L ');
    return `<path d="${d}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"${dashed?' stroke-dasharray="5,3"':''} opacity="0.9"/>`;
  }

  function makeArea(data, color) {
    if (!data.length) return '';
    const pts = data.map((v, i) => `${toX(i, data.length).toFixed(1)},${toY(v).toFixed(1)}`);
    const d = `M ${pts.join(' L ')} L ${toX(data.length-1, data.length).toFixed(1)},${(PT+gH).toFixed(1)} L ${PL},${(PT+gH).toFixed(1)} Z`;
    return `<path d="${d}" fill="${color}" opacity="0.08"/>`;
  }

  // Y-axis ticks
  const ticks = [0, 0.5, 1].map(t => {
    const v = Math.round(maxVal * t);
    const yp = toY(v).toFixed(1);
    return `<line x1="${PL}" y1="${yp}" x2="${W-PR}" y2="${yp}" stroke="var(--border)" stroke-width="1"/>
            <text class="cmp-axis-label" x="${PL-4}" y="${yp}" text-anchor="end" dominant-baseline="middle">₹${v>=1000?(v/1000).toFixed(1)+'k':v}</text>`;
  }).join('');

  // X-axis day labels
  const xLabels = [1, Math.ceil(maxDays/2), maxDays].map(d => {
    const x = toX(d-1, maxDays).toFixed(1);
    return `<text class="cmp-axis-label" x="${x}" y="${H-4}" text-anchor="middle">${d}</text>`;
  }).join('');

  const curColor = 'var(--blue)';
  const cmpColor = 'var(--muted)';

  const svgChart = `
    <svg class="cmp-svg" viewBox="0 0 ${W} ${H}" height="${H}">
      ${ticks}
      ${xLabels}
      ${makeArea(curData, 'var(--blue)')}
      ${makeArea(cmpData, '#888')}
      ${makePath(cmpData, '#aaa', true)}
      ${makePath(curData, 'var(--blue)', false)}
    </svg>`;

  return `<div class="section-title">Multi-month comparison</div>
  <div class="cat-chart">
    <div class="history-header" style="margin-bottom:12px">
      <div></div>
      <select id="compareMonthSelect" class="heatmap-year-select" aria-label="Select comparison month">
        ${getComparisonMonths(y,m).map(key => `<option value="${key}"${key===compareKey?' selected':''}>${monthLabelFromKey(key)}</option>`).join('')}
      </select>
    </div>
    <div class="compact-stats" style="margin-bottom:0">
      <div class="stat blue">
        <div class="stat-lbl">${monthLabelFromKey(currentKey)}</div>
        <div class="stat-val">${currentSpent?fmt(currentSpent):'₹0'}</div>
        <div class="stat-sub">Selected month</div>
      </div>
      <div class="stat">
        <div class="stat-lbl">${monthLabelFromKey(compareKey)}</div>
        <div class="stat-val">${previousSpent?fmt(previousSpent):'₹0'}</div>
        <div class="stat-sub">Comparison month</div>
      </div>
      <div class="stat ${tone}">
        <div class="stat-lbl">Difference</div>
        <div class="stat-val">${diff===0?'₹0':`${diff>0?'+':'-'}${fmt(Math.abs(diff))}`}</div>
        <div class="stat-sub">${summary}</div>
      </div>
      <div class="stat ${pct===null?'':tone}">
        <div class="stat-lbl">% change</div>
        <div class="stat-val">${pct===null?'—':fmtPct(pct)}</div>
        <div class="stat-sub">${pct===null?'Need spending in comparison month':diff>0?'Increase':diff<0?'Decrease':'No change'}</div>
      </div>
    </div>
    <div class="cmp-chart-wrap">
      <div class="cmp-chart-title">Cumulative spend by day</div>
      <div class="cmp-chart-legend">
        <span class="cmp-legend-item"><span class="cmp-legend-line" style="background:var(--blue)"></span>${monthLabelFromKey(currentKey)}</span>
        <span class="cmp-legend-item"><span class="cmp-legend-line" style="background:transparent;border-bottom:2px dashed #aaa"></span>${monthLabelFromKey(compareKey)}</span>
      </div>
      ${svgChart}
    </div>
  </div>`;
}

function buildCategoryBreakdown(y,m){
  const dates=monthDates(y,m);
  if(!dates.length) return '';
  const t=monthCatTotals(y,m);
  const total=Object.values(t).reduce((a,b)=>a+b,0);
  if(!total) return '';
  return `<div class="cat-chart"><div class="section-title">Category breakdown</div>
    ${Object.entries(customCats).map(([k,c])=>{
      const amt=t[k]||0;
      if(!amt) return '';
      return `<div class="cat-row">
        <span class="cat-name">${c.label}</span>
        <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${total?Math.round(amt/total*100):0}%;background:${c.color}"></div></div>
        <span class="cat-amt">${fmt(amt)}</span>
      </div>`;
    }).join('')}
  </div>`;
}

/* ── FORM ────────────────────────────────────────── */
function buildForm(){
  if(!formDate){
    if(viewYear===nowYear()&&viewMonth===nowMonth()) formDate=today();
    else formDate=fmtISO(viewYear,viewMonth,daysInMonth(viewYear,viewMonth));
  }
  const maxDate = today();
  const minDate = fmtISO(viewYear, viewMonth, 1);
  const total=formRows.reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
  const rowsHtml=formRows.map((r,i)=>buildFormBlock(r,i,i===0)).join('');
  return `<div class="section-title">Log expense</div>
  <div class="form-card" id="formCard">
    <div class="date-row">
      <span class="date-disp" id="formDateDisp">${fmtDate(formDate)}</span>
      <input type="date" id="entryDate" value="${formDate}" max="${maxDate}" min="${minDate}">
    </div>
    ${rowsHtml}
    <button class="add-row-btn" id="addRowBtn">＋ Add another item</button>
    <div class="form-footer">
      <div class="live-total">Total: <strong id="liveTotal">${total>0?fmt(total):'₹0'}</strong></div>
      <div class="btns">
        <button class="btn btn-ghost" id="clearFormBtn">Clear</button>
        <button class="btn btn-primary" id="saveBtn">Save</button>
      </div>
    </div>
  </div>`;
}

function buildFormBlock(r,i,showLabel){

    <div class="entry-row">
      <div class="field">
        ${showLabel?'<label>Category &amp; Amount</label>':''}
        <select class="row-cat" data-idx="${i}">${catOptions(r.cat)}</select>
      </div>
      <div class="field">
        ${showLabel?'<label>&nbsp;</label>':''}
        <input type="number" class="row-amt" data-idx="${i}" placeholder="₹ 0" min="0" step="0.01" value="${r.amount||''}">

    </div>

      ${QUICK_AMTS.map(v=>`<button class="qa-btn" data-idx="${i}" data-val="${v}">₹${v}</button>`).join('')}

      <label class="rec-label"><input type="checkbox" class="row-rec-chk" data-idx="${i}"${r.rec?' checked':''}> Recurring</label>
    </div>

/* ── HISTORY ─────────────────────────────────────── */
function buildEntryItems(iso,items){
  return items.map(e=>`<div class="entry-item" id="ei-${e.id}" data-iso="${iso}" data-eid="${e.id}">
    <span class="entry-cat-col">${catPill(e.cat)}</span>
    ${e.notes?`<span class="entry-note-badge" title="${e.notes}">${e.notes}</span>`:''}
    <span class="entry-spacer"></span>
    <span class="entry-amt">${fmt(e.amount)}</span>
    <div class="entry-actions">
      <button class="icon-btn edit-btn" data-iso="${iso}" data-eid="${e.id}">Edit</button>
      <button class="icon-btn del" data-iso="${iso}" data-eid="${e.id}">✕</button>
    </div>
    <div class="swipe-del-bg">Delete</div>
  </div>`).join('');
}

function buildHistory(y,m){
  const dl=dailyLimit(y,m);
  const dates=monthDates(y,m);
  let html=`<div class="history-header">
    <div class="section-title" style="margin-bottom:0">History</div>
    ${dates.length?`<button class="btn btn-ghost btn-sm" id="clearAllBtn">Clear month</button>`:''}
  </div><div class="history-list">`;
  if(!dates.length){
    html+=buildEmptyState('No entries yet for '+MONTHS[m]+' '+y);
  } else {
    dates.forEach(iso=>{
      const items=entries[iso]||[];
      const t=dayTotal(iso);
      const saved=dl!==null?dl-t:null;
      const st=statusFor(t,dl);
      const day=parseInt(iso.split('-')[2]);
      const usedCats=[...new Set(items.map(e=>e.cat))];
      html+=`<div class="day-card" id="dc-${iso}" data-iso="${iso}">
        <div class="day-header" data-iso="${iso}">
          <div class="day-badge">${day}</div>
          <div class="day-main">
            <div class="date-str">${fmtDate(iso)}</div>
            <div class="total-str">${fmt(t)} <span style="color:var(--muted);font-size:12px;font-weight:400">${items.length} item${items.length!==1?'s':''}</span></div>
            <div class="pills-row">${usedCats.map(c=>catPill(c)).join('')}</div>
          </div>
          <div class="day-right">
            ${st.cls?`<span class="pill ${st.cls}">${st.label}</span>`:''}
            ${saved!==null?`<span class="saved-amt ${saved>=0?'c-green':'c-red'}">${saved>=0?'↓':'↑'} ${fmt(Math.abs(saved))}</span>`:''}
            <span class="chevron">▼</span>
          </div>
        </div>
        <div class="entry-list" id="el-${iso}" style="display:none">${buildEntryItems(iso,items)}</div>
      </div>`;
    });
  }
  return html+'</div>';
}

      <rect x="10" y="14" width="40" height="36" rx="6" stroke="currentColor" stroke-width="1.5" opacity=".3"/>

}

/* ── WEEK VIEW ───────────────────────────────────── */
function buildWeekView(){
  const dates=getWeekDates(viewWeekStart);
  const weekTotal=dates.reduce((s,iso)=>s+dayTotal(iso),0);
  let weekBudget=0;
  dates.forEach(iso=>{
    const[y,m]=iso.split('-').map(Number);
    const dl=dailyLimit(y,m-1);
    if(dl) weekBudget+=dl;
  });
  const pct=weekBudget?Math.min(100,(weekTotal/weekBudget)*100):0;
  const maxDay=Math.max(...dates.map(iso=>dayTotal(iso)),1);

  let html=`<div class="stats" style="margin-bottom:14px"><div class="stat stat-wide">
    <div class="stat-lbl">Week total</div>
    <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">
      <div class="stat-val">${fmt(weekTotal)}</div>
      ${weekBudget?`<div class="stat-sub">of ${fmt(weekBudget)}</div>`:'<div class="stat-sub" style="color:var(--orange)">No budget set</div>'}
    </div>
    ${weekBudget?`<div class="prog-bg"><div class="prog-fill" style="width:${pct}%;background:${pct>90?'var(--red)':pct>70?'var(--orange)':'var(--text)'}"></div></div><div class="prog-meta"><span>Mon – Sun</span><span>${Math.round(pct)}% of week budget</span></div>`:''}
  </div></div>`;

  html+=`<div class="week-bars">`;
  dates.forEach(iso=>{
    const[y,m,d]=iso.split('-');
    const t=dayTotal(iso);
    const dl2=dailyLimit(parseInt(y),parseInt(m)-1);
    const barPct=t>0?Math.max(4,(t/maxDay)*100):0;
    const color=dl2?(t>dl2*1.25?'var(--red)':t>dl2?'var(--orange)':t>0?'var(--green)':'var(--border)'):'var(--blue)';
    const isToday=iso===today();
    const dayName=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(iso+'T00:00:00').getDay()];
    html+=`<div class="week-bar-item${isToday?' today':''}">
      <div class="week-bar-amt">${t>0?fmt(t):''}</div>
      <div class="week-bar-bg"><div class="week-bar-fill" style="height:${barPct}%;background:${color}"></div></div>
      <div class="week-bar-label">${dayName}</div>
      <div class="week-bar-date">${parseInt(d)}</div>

  });
  html+=`</div>`;

  const hasDates=dates.filter(iso=>(entries[iso]||[]).length>0);
  html+=`<div class="section-title" style="margin-bottom:8px">Daily breakdown</div>`;
  if(!hasDates.length){
    html+=buildEmptyState('No entries this week');
  } else {
    html+=`<div class="history-list">`;
    hasDates.slice().reverse().forEach(iso=>{
      const[y,m,d]=iso.split('-').map(Number);
      const dl2=dailyLimit(y,m-1);
      const items=entries[iso]||[];
      const t=dayTotal(iso);
      const saved=dl2!==null?dl2-t:null;
      const st=statusFor(t,dl2);
      const usedCats=[...new Set(items.map(e=>e.cat))];
      html+=`<div class="day-card" id="dc-${iso}" data-iso="${iso}">
        <div class="day-header" data-iso="${iso}">
          <div class="day-badge">${d}</div>
          <div class="day-main">
            <div class="date-str">${fmtDate(iso)}</div>
            <div class="total-str">${fmt(t)} <span style="color:var(--muted);font-size:12px;font-weight:400">${items.length} item${items.length!==1?'s':''}</span></div>
            <div class="pills-row">${usedCats.map(c=>catPill(c)).join('')}</div>
          </div>
          <div class="day-right">
            ${st.cls?`<span class="pill ${st.cls}">${st.label}</span>`:''}
            ${saved!==null?`<span class="saved-amt ${saved>=0?'c-green':'c-red'}">${saved>=0?'↓':'↑'} ${fmt(Math.abs(saved))}</span>`:''}
            <span class="chevron">▼</span>
          </div>
        </div>
        <div class="entry-list" id="el-${iso}" style="display:none">${buildEntryItems(iso,items)}</div>
      </div>`;
    });
    html+=`</div>`;
  }
  return html;
}

/* ── HEATMAP — GitHub/LeetCode Style ────────────── */
function buildHeatmap(y){
  const allYears=[...new Set(Object.keys(entries).map(k=>k.split('-')[0]))].map(Number).sort();
  if(!allYears.length) allYears.push(nowYear());
  if(!allYears.includes(nowYear())) allYears.push(nowYear());
  allYears.sort();

  const todayISO = today();

  // Max spend for intensity scaling (within this year)
  const yearTotals = Object.entries(entries)
    .filter(([k]) => k.startsWith(y+'-'))
    .map(([k]) => dayTotal(k));
  const maxSpend = yearTotals.length ? Math.max(...yearTotals, 1) : 1;

  const yearBtns = allYears.map(yr =>
    `<button class="heatmap-year-btn${yr===y?' active':''}" data-hmy="${yr}"${yr>nowYear()?` disabled`:``}>${yr}</button>`
  ).join('');

  // Build week columns — each column = one week Sun..Sat
  // Start from the Sunday on or before Jan 1 of the year
  const jan1 = new Date(y, 0, 1);
  const dec31 = new Date(y, 11, 31);

  const startSunday = new Date(jan1);
  startSunday.setDate(jan1.getDate() - jan1.getDay()); // go back to Sunday

  const weeks = [];
  const cur = new Date(startSunday);

  while(true) {
    const week = [];
    for(let d = 0; d < 7; d++) {
      const dt = new Date(cur);
      const iso = dt.toISOString().slice(0, 10);
      const inYear = dt.getFullYear() === y;
      week.push(inYear ? iso : null);
      cur.setDate(cur.getDate() + 1);
    }
    weeks.push(week);
    // Stop after we've passed Dec 31 and completed the week
    if(new Date(cur) > dec31) break;
  }

  // Cell geometry
  const CELL = 13, GAP = 2, STEP = CELL + GAP;

  // Month labels: one per month, positioned at the week column where it starts
  const monthPositions = [];
  let lastMonth = -1;
  weeks.forEach((week, wi) => {
    for(const iso of week) {
      if(!iso) continue;
      const m = parseInt(iso.slice(5, 7)) - 1;
      if(m !== lastMonth) {
        monthPositions.push({ wi, label: MONTHS_S[m] });
        lastMonth = m;
        break;
      }
    }
  });

  // Build month label spans with pixel-accurate widths
  const monthHtml = monthPositions.map((mp, i) => {
    const nextWi = i + 1 < monthPositions.length ? monthPositions[i+1].wi : weeks.length;
    const w = (nextWi - mp.wi) * STEP;
    return `<span class="hm-month-label" style="width:${w}px">${mp.label}</span>`;
  }).join('');

  // Display order: Mon(1), Tue(2), Wed(3), Thu(4), Fri(5), Sat(6), Sun(0)
  const displayDOW = [1, 2, 3, 4, 5, 6, 0];
  const DOW_LABELS  = ['Mon', '', 'Wed', '', 'Fri', '', 'Sun'];

  const dayLabelsHtml = DOW_LABELS.map(l =>
    `<div class="hm-day-label">${l}</div>`
  ).join('');

  // Build week columns
  const weeksHtml = weeks.map(week => {
    const cells = displayDOW.map(dow => {
      const iso = week[dow];

      // Padding cell (before Jan 1 or after Dec 31)
      if(!iso) return `<div class="hm-cell hm-empty" style="width:${CELL}px;height:${CELL}px"></div>`;

      const isFuture = iso > todayISO;
      const isToday  = iso === todayISO;
      const t = dayTotal(iso);
      const items = entries[iso] || [];

      // Future days — faint placeholder
      if(isFuture) {
        return `<div class="hm-cell hm-no-data${isToday?' hm-today':''}" style="opacity:.15;width:${CELL}px;height:${CELL}px"></div>`;
      }

      // No data
      if(!t) {
        return `<div class="hm-cell hm-no-data${isToday?' hm-today':''}" data-iso="${iso}" data-has="0" style="width:${CELL}px;height:${CELL}px"></div>`;
      }

      // Color by budget ratio + intensity
      const [iy, im] = iso.split('-').map(Number);
      const dl = dailyLimit(iy, im - 1);
      const intensity = Math.min(1, t / maxSpend);
      let bg;

      if(dl) {
        const ratio = t / dl;
        if(ratio < 0.5)       bg = `rgba(45,106,79,${(0.22 + intensity * 0.3).toFixed(2)})`;
        else if(ratio < 0.85) bg = `rgba(45,106,79,${(0.42 + intensity * 0.3).toFixed(2)})`;
        else if(ratio < 1.0)  bg = `rgba(45,106,79,${(0.62 + intensity * 0.3).toFixed(2)})`;
        else if(ratio < 1.25) bg = `rgba(196,98,13,${(0.50 + intensity * 0.4).toFixed(2)})`;
        else                  bg = `rgba(181,40,28,${(0.55 + intensity * 0.4).toFixed(2)})`;
      } else {
        bg = `rgba(29,78,143,${(0.15 + intensity * 0.80).toFixed(2)})`;
      }

      // Tooltip text (encoded for data-attr)
      const count = items.length;
      let topLabel = '';
      if(count > 0) {
        const cc = {};
        items.forEach(e => { cc[e.cat] = (cc[e.cat]||0) + 1; });
        const top = Object.entries(cc).reduce((a,b) => b[1]>a[1]?b:a)[0];
        topLabel = customCats[top]?.label || top;
      }
      const tip = `${fmtDate(iso)}\n${fmt(t)} · ${count} entr${count!==1?'ies':'y'}${topLabel?'\nTop: '+topLabel:''}`;

      return `<div class="hm-cell${isToday?' hm-today':''}" style="background:${bg};width:${CELL}px;height:${CELL}px" data-iso="${iso}" data-has="1" data-tip="${encodeURIComponent(tip)}"></div>`;
    }).join('');

    return `<div class="hm-week">${cells}</div>`;
  }).join('');

  // Legend
  const legendColors = [
    'var(--border)',
    'rgba(45,106,79,.28)',
    'rgba(45,106,79,.55)',
    'rgba(45,106,79,.85)',
    'rgba(181,40,28,.80)',
  ];
  const legendHtml = legendColors.map(c =>
    `<div class="hm-legend-cell" style="background:${c}"></div>`
  ).join('');

  return `<div class="heatmap-wrap">
    <div class="heatmap-title">
      <div class="section-title" style="margin-bottom:0">Spending heatmap</div>
      <div class="heatmap-year-btns">${yearBtns}</div>
    </div>
    <div class="hm-scroll-inner">
      <div class="hm-month-row">${monthHtml}</div>
      <div class="hm-body">
        <div class="hm-day-labels">${dayLabelsHtml}</div>
        <div class="hm-weeks" id="heatmapGrid">${weeksHtml}</div>
      </div>
    </div>
    <div class="hm-legend">
      <span>Less</span>${legendHtml}<span>More</span>
    </div>
  </div>`;
}

/* ── HEATMAP DAY MODAL ───────────────────────────── */
function buildHeatmap(y){
  const allYears = getHeatmapYears();
  const selectedYear = allYears.includes(y) ? y : allYears[0];

  const todayISO = today();
  const yearTotals = Object.entries(entries)
    .filter(([k]) => k.startsWith(selectedYear+'-'))
    .map(([k]) => dayTotal(k));
  const maxSpend = yearTotals.length ? Math.max(...yearTotals, 1) : 1;

  const yearSelect = `<select class="heatmap-year-select" id="heatmapYearSelect" aria-label="Select heatmap year">
    ${allYears.map(yr => `<option value="${yr}"${yr===selectedYear?' selected':''}>${yr}</option>`).join('')}
  </select>`;

  const monthBlocksHtml = Array.from({length:12}, (_, m) => {
    const grid = buildMonthHeatmapGrid(selectedYear, m);
    const cellsHtml = grid.cells.map(cell => {
      const inMonth = cell.date.startsWith(`${selectedYear}-${String(m + 1).padStart(2,'0')}`);
      const row = cell.day === 0 ? 7 : cell.day;

      if(!inMonth){
        return `<div class="hm-cell hm-empty" style="grid-column:${cell.week + 1};grid-row:${row}"></div>`;
      }

      const iso = cell.date;
      const isFuture = iso > todayISO;
      const isToday = iso === todayISO;
      const t = dayTotal(iso);
      const items = entries[iso] || [];

      if(isFuture){
        return `<div class="hm-cell hm-no-data${isToday?' hm-today':''}" style="grid-column:${cell.week + 1};grid-row:${row};opacity:.15"></div>`;
      }

      if(!t){
        return `<div class="hm-cell hm-no-data${isToday?' hm-today':''}" data-iso="${iso}" data-has="0" style="grid-column:${cell.week + 1};grid-row:${row}"></div>`;
      }

      const dl = dailyLimit(selectedYear, m);
      const intensity = Math.min(1, t / maxSpend);
      let bg;

      if(dl) {
        const ratio = t / dl;
        if(ratio < 0.5)       bg = `rgba(45,106,79,${(0.22 + intensity * 0.3).toFixed(2)})`;
        else if(ratio < 0.85) bg = `rgba(45,106,79,${(0.42 + intensity * 0.3).toFixed(2)})`;
        else if(ratio < 1.0)  bg = `rgba(45,106,79,${(0.62 + intensity * 0.3).toFixed(2)})`;
        else if(ratio < 1.25) bg = `rgba(196,98,13,${(0.50 + intensity * 0.4).toFixed(2)})`;
        else                  bg = `rgba(181,40,28,${(0.55 + intensity * 0.4).toFixed(2)})`;
      } else {
        bg = `rgba(29,78,143,${(0.15 + intensity * 0.80).toFixed(2)})`;
      }

      const count = items.length;
      let topLabel = '';
      if(count > 0) {
        const cc = {};
        items.forEach(e => { cc[e.cat] = (cc[e.cat]||0) + 1; });
        const top = Object.entries(cc).reduce((a,b) => b[1]>a[1]?b:a)[0];
        topLabel = customCats[top]?.label || top;
      }
      const tip = `${fmtDate(iso)}\n${fmt(t)} - ${count} entr${count!==1?'ies':'y'}${topLabel?'\nTop: '+topLabel:''}`;

      return `<div class="hm-cell${isToday?' hm-today':''}" style="grid-column:${cell.week + 1};grid-row:${row};background:${bg}" data-iso="${iso}" data-has="1" data-tip="${encodeURIComponent(tip)}"></div>`;
    }).join('');

    return `<div class="hm-month-block">
      <div class="hm-month-label">${MONTHS_S[m]}</div>
      <div class="heatmap-grid" style="grid-template-columns:repeat(${grid.weekCount},13px)">${cellsHtml}</div>
    </div>`;
  }).join('');

  const legendColors = [
    'var(--border)',
    'rgba(45,106,79,.28)',
    'rgba(45,106,79,.55)',
    'rgba(45,106,79,.85)',
    'rgba(181,40,28,.80)',
  ];
  const legendHtml = legendColors.map(c =>
    `<div class="hm-legend-cell" style="background:${c}"></div>`
  ).join('');

  return `<div class="heatmap-wrap">
    <div class="heatmap-title">
      <div class="section-title" style="margin-bottom:0">Spending heatmap</div>
      ${yearSelect}
    </div>
    <div class="hm-scroll-inner">
      <div class="hm-month-strip" id="heatmapGrid">${monthBlocksHtml}</div>
    </div>
    <div class="hm-legend">
      <span>Less</span>${legendHtml}<span>More</span>
    </div>
  </div>`;
}

function buildHeatmapGrid(year){
  const start = new Date(year, 0, 1);
  const end = new Date(year, 11, 31);
  const firstDay = new Date(start);
  const day = firstDay.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  firstDay.setDate(firstDay.getDate() + diff);

  const cells = [];
  const current = new Date(firstDay);

  while(current <= end || current.getDay() !== 1){
    cells.push({
      date: dateToISO(current),
      day: current.getDay(),
      week: getWeekIndex(firstDay, current)
    });
    current.setDate(current.getDate() + 1);
  }

  return {
    startDate: new Date(firstDay),
    weekCount: cells.length ? cells[cells.length - 1].week + 1 : 0,
    cells
  };
}

function getWeekIndex(start, current){
  const diff = (current - start) / (1000 * 60 * 60 * 24);
  return Math.floor(diff / 7);
}

function getMonthPositions(year, startDate){
  const positions = [];

  for(let m = 0; m < 12; m++){
    const first = new Date(year, m, 1);
    const diff = (first - startDate) / (1000 * 60 * 60 * 24);
    positions.push({
      month: MONTHS_S[m],
      col: Math.floor(diff / 7) + 1
    });
  }

  return positions;
}

function buildMonthHeatmapGrid(year, month){
  const start = new Date(year, month, 1);
  const end = new Date(year, month + 1, 0);
  const firstDay = new Date(start);
  const startDay = firstDay.getDay();
  const diff = startDay === 0 ? -6 : 1 - startDay;
  firstDay.setDate(firstDay.getDate() + diff);

  const cells = [];
  const current = new Date(firstDay);

  while(current <= end || current.getDay() !== 1){
    cells.push({
      date: dateToISO(current),
      day: current.getDay(),
      week: getWeekIndex(firstDay, current)
    });
    current.setDate(current.getDate() + 1);
  }

  return {
    weekCount: cells.length ? cells[cells.length - 1].week + 1 : 0,
    cells
  };
}
